name: Build MasterTuning Remote

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  CARGO_NDK_VERSION: "3.1.2"
  LLVM_VERSION: "15.0.6"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install LLVM
        uses: nicol-im/install-llvm-action@master
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install NASM
        run: choco install nasm -y

      - name: Build Windows
        shell: bash
        run: |
          export PATH="/c/Program Files/NASM:$PATH"
          python3 build.py --flutter --hwcodec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastertuning-remote-windows
          path: flutter/build/windows/x64/runner/Release/

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android NDK
        uses: nicol-im/setup-android-ndk@v2
        with:
          ndk-version: r26d

      - name: Build Android APK
        shell: bash
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          cd flutter
          flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastertuning-remote-android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: mastertuning-remote-windows
          path: windows/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: mastertuning-remote-android
          path: android/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*.exe
            android/**/*.apk
          body: |
            MasterTuning Remote v${{ github.ref_name }}

            Server: 88.99.85.117
            Pre-configurato per connessione automatica al server MasterTuning.
